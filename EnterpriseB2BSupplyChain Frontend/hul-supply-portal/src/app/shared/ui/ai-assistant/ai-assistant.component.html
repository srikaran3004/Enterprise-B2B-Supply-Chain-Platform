<!-- ═══════════════════════════════════════════════════════════════════════
     AI Assistant — Floating Chat Widget
     Fixed bottom-right; toggled by the FAB button.
════════════════════════════════════════════════════════════════════════ -->

<!-- ── FAB Toggle Button ────────────────────────────────────────────────── -->
<button
  id="ai-assistant-fab"
  class="ai-fab"
  (click)="toggleChat()"
  [class.ai-fab--active]="isOpen"
  title="{{ isOpen ? 'Close AI Assistant' : 'Open AI Assistant' }}"
  aria-label="Toggle AI Supply Chain Assistant"
>
  <!-- Chat icon (shown when closed) -->
  <svg *ngIf="!isOpen" class="ai-fab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
  </svg>
  <!-- X icon (shown when open) -->
  <svg *ngIf="isOpen" class="ai-fab__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
  </svg>

  <!-- Pulsing ring on closed state -->
  <span *ngIf="!isOpen" class="ai-fab__pulse"></span>
</button>

<!-- ── Chat Panel ────────────────────────────────────────────────────────── -->
<div
  id="ai-assistant-panel"
  class="ai-panel"
  [class.ai-panel--open]="isOpen"
  role="dialog"
  aria-label="HUL AI Supply Chain Assistant"
>

  <!-- Header -->
  <div class="ai-panel__header">
    <div class="ai-header__left">
      <div class="ai-header__avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15M14.25 3.104c.251.023.501.05.75.082M19.8 15l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.607L5 14.5m14.8.5l-1.399 2.098A10.5 10.5 0 0112 19.5a10.5 10.5 0 01-6.401-2.402L5 14.5" />
        </svg>
      </div>
      <div class="ai-header__info">
        <span class="ai-header__name">HUL Supply Chain AI</span>
        <span class="ai-header__status">
          <span class="ai-status-dot" [class.ai-status-dot--typing]="isTyping"></span>
          {{ isTyping ? 'Typing...' : 'Online' }}
        </span>
      </div>
    </div>
    <div class="ai-header__actions">
      <button class="ai-icon-btn" (click)="clearChat()" title="Clear conversation" id="ai-clear-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
      <button class="ai-icon-btn" (click)="closeChat()" title="Close" id="ai-close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="ai-quick-actions" *ngIf="quickActions.length > 0">
    <button 
      *ngFor="let action of quickActions" 
      class="ai-chip" 
      (click)="sendMessage(action)" 
      [disabled]="isTyping"
    >
      {{ action }}
    </button>
  </div>

  <!-- Message List -->
  <div class="ai-panel__messages" #messageList>
    <div
      *ngFor="let msg of messages; trackBy: trackByIndex; let i = index"
      class="ai-msg"
      [class.ai-msg--user]="msg.sender === 'user'"
      [class.ai-msg--ai]="msg.sender === 'ai'"
    >
      <!-- AI avatar dot -->
      <div *ngIf="msg.sender === 'ai'" class="ai-msg__avatar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7h1a1 1 0 010 2h-1v1a2 2 0 01-2 2H5a2 2 0 01-2-2v-1H2a1 1 0 010-2h1a7 7 0 017-7h1V5.73A2 2 0 0110 4a2 2 0 012-2zM9 9a5 5 0 000 10h6a5 5 0 000-10H9zm0 2h6a3 3 0 010 6H9a3 3 0 010-6zm0 1a1 1 0 100 2 1 1 0 000-2zm6 0a1 1 0 100 2 1 1 0 000-2z"/>
        </svg>
      </div>

      <!-- Bubble -->
      <div class="ai-msg__bubble">
        <p class="ai-msg__text" [innerHTML]="msg.text | safeHtml"></p>
        <span class="ai-msg__time">{{ msg.timestamp | date:'HH:mm' }}</span>
      </div>
    </div>

    <!-- Typing indicator -->
    <div *ngIf="isTyping" class="ai-msg ai-msg--ai ai-typing-row">
      <div class="ai-msg__avatar">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7h1a1 1 0 010 2h-1v1a2 2 0 01-2 2H5a2 2 0 01-2-2v-1H2a1 1 0 010-2h1a7 7 0 017-7h1V5.73A2 2 0 0110 4a2 2 0 012-2z"/>
        </svg>
      </div>
      <div class="ai-typing-bubble">
        <span class="ai-typing-dot"></span>
        <span class="ai-typing-dot"></span>
        <span class="ai-typing-dot"></span>
      </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="ai-panel__input-bar">
    <textarea
      id="ai-message-input"
      class="ai-input"
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      placeholder="Ask about returns, shipping, orders…"
      rows="1"
      [disabled]="isTyping"
      aria-label="Type your message"
    ></textarea>
    <button
      id="ai-send-btn"
      class="ai-send-btn"
      (click)="sendMessage()"
      [disabled]="!inputText.trim() || isTyping"
      title="Send message"
      aria-label="Send message"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
      </svg>
    </button>
  </div>

  <!-- Footer branding -->
  <div class="ai-panel__footer">
    <span>Powered by <strong>Groq · llama-3.3-70b</strong> · HUL RAG Knowledge Base</span>
  </div>
</div>
